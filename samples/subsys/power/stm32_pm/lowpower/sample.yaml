sample:
  name: Low Power State Sample for nucleo_l4r5zi
tests:
  sample.power.ospm.dev_idle_pm:
    platform_whitelist: nucleo_l4r5zi
    timeout: 150
    tags: power
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "--> Entering to SYS_POWER_STATE_SLEEP_1 state."
        - "--> Exited from SYS_POWER_STATE_SLEEP_1 state."
        - "--> Entering to SYS_POWER_STATE_SLEEP_2 state."
        - "--> Exited from SYS_POWER_STATE_SLEEP_2 state."
        - "--> Entering to SYS_POWER_STATE_SLEEP_3 state."
        - "--> Exited from SYS_POWER_STATE_SLEEP_3 state."
        - "--> Entering to SYS_POWER_STATE_DEEP_SLEEP_1 state."
        - "--> Exited from SYS_POWER_STATE_DEEP_SLEEP_1 state."
        - "--> Entering to SYS_POWER_STATE_DEEP_SLEEP_2 state."
        - "--> Exited from SYS_POWER_STATE_DEEP_SLEEP_2 state."
